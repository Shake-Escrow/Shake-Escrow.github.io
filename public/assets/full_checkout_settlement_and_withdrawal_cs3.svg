<title  opacity="1" fill="#000000" stroke="none" color="#0B0B0B" text-anchor="start" font-weight="400" font-size="16px" font-family="&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif" stroke-linejoin="miter" stroke-linecap="butt" stroke-width="1" dominant-baseline="auto">
	Full flow: checkout through settlement to merchant withdrawal</title>
<desc  opacity="1" fill="#000000" stroke="none" color="#0B0B0B" text-anchor="start" font-weight="400" font-size="16px" font-family="&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif" stroke-linejoin="miter" stroke-linecap="butt" stroke-width="1" dominant-baseline="auto">
	Five actors handle checkout and settlement: merchant backend, Shake DeFi backend, checkout widget, customer wallet, and the smart contract. The smart contract&apos;s node extends downward through two more steps: it pays the merchant wallet, and the merchant wallet is later moved by the merchant to an off-ramp destination. A warning notes there is no Shake DeFi safety net for that last step.
	</desc>
